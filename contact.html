<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrewInsight — Contact</title>

<link rel="stylesheet" href="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/tokens/fonts.css">
<link rel="stylesheet" href="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/tokens/colors.css">
<link rel="stylesheet" href="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/tokens/typography.css">
<link rel="stylesheet" href="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/tokens/spacing.css">
<link rel="stylesheet" href="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/tokens/effects.css">
<link rel="stylesheet" href="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/styles.css">
<link rel="stylesheet" href="site.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/_ds_bundle.js"></script>

<style>
.field { display: flex; flex-direction: column; gap: 8px; }
.field label {
  font-weight: var(--fw-semibold);
  font-size: var(--ui-sm);
  color: var(--ink);
}
.field input, .field textarea {
  font-family: var(--font-structure);
  font-size: var(--ui-base);
  color: var(--ink);
  background: var(--surface-card);
  border: 1px solid var(--track-grey);
  border-radius: var(--radius-md);
  padding: 13px 14px;
  outline: none;
  transition: border-color var(--dur-fast) var(--ease-standard), box-shadow var(--dur-fast) var(--ease-standard);
}
.field input:focus, .field textarea:focus {
  border-color: var(--forest);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--forest) 14%, transparent);
}
.field textarea { resize: vertical; min-height: 120px; }
.contact-method {
  display: flex; align-items: flex-start; gap: 14px;
}
.contact-method .mi {
  flex: 0 0 auto;
  width: 44px; height: 44px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md);
  background: color-mix(in srgb, var(--forest) 10%, var(--paper));
  color: var(--forest);
}
.contact-method .mi svg { width: 20px; height: 20px; }
@media (max-width: 860px) { .contact-grid { grid-template-columns: 1fr !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel">
const { Eyebrow } = window.BrewInsightDesignSystem_a940df;
const { useState, useEffect } = React;

function ContactForm() {
  const [sent, setSent] = useState(false);
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [sent]);
  const submit = (e) => {
    e.preventDefault();
    setSent(true);
  };
  if (sent) {
    return (
      <Framed className="card" style={{ padding: "clamp(32px, 5vw, 56px)", textAlign: "center" }}>
        <div className="stack" style={{ alignItems: "center", gap: "var(--space-4)" }}>
          <span className="feature-ico" style={{ marginBottom: 0 }}><Ico name="check" className="" /></span>
          <h3 className="h2">Thanks, we got it.</h3>
          <p className="lead" style={{ textAlign: "center" }}>We reply within a day, usually with your café's first read attached. ☕</p>
        </div>
      </Framed>
    );
  }
  return (
    <Framed className="card" style={{ padding: "clamp(28px, 4vw, 40px)" }}>
      <form className="stack gap-5" onSubmit={submit}>
        <div className="grid grid-2" style={{ gap: "var(--space-4)" }}>
          <div className="field">
            <label htmlFor="name">Your name</label>
            <input id="name" name="name" type="text" required placeholder="Jamie Rivera" />
          </div>
          <div className="field">
            <label htmlFor="cafe">Café name</label>
            <input id="cafe" name="cafe" type="text" placeholder="Corner Roasters" />
          </div>
        </div>
        <div className="field">
          <label htmlFor="email">Email</label>
          <input id="email" name="email" type="email" required placeholder="jamie@cornerroasters.com" />
        </div>
        <div className="field">
          <label htmlFor="message">What can we help with?</label>
          <textarea id="message" name="message" placeholder="I'd love a free trial for my café in Los Angeles."></textarea>
        </div>
        <button type="submit" className="btn btn--forest btn--lg">Send message<Ico name="arrow-right" /></button>
      </form>
    </Framed>
  );
}

function Contact() {
  return (
    <section className="section" style={{ paddingTop: "var(--space-9)" }}>
      <div className="container">
        <div className="stack gap-5" style={{ maxWidth: "56ch" }}>
          <span className="eyebrow">Contact</span>
          <h1 className="display">Let's talk <span className="accent">café data.</span></h1>
          <p className="lead" style={{ maxWidth: "50ch" }}>
            Want a free trial, a quick walkthrough, or just to compare notes on what's selling? Drop us a line. We're café people too.
          </p>
        </div>

        <div className="contact-grid mt-7" style={{ display: "grid", gridTemplateColumns: "0.85fr 1.15fr", gap: "var(--space-8)", alignItems: "start" }}>
          <div className="stack gap-6">
            <div className="contact-method">
              <span className="mi"><Ico name="mail" className="" /></span>
              <div className="stack gap-2">
                <span style={{ fontWeight: "var(--fw-semibold)" }}>Email</span>
                <a href="mailto:hello@brewinsight.co" style={{ color: "var(--forest)", fontWeight: 600 }}>hello@brewinsight.co</a>
                <span className="body" style={{ fontSize: "var(--ui-sm)" }}>We reply within a day.</span>
              </div>
            </div>
            <div className="contact-method">
              <span className="mi"><Ico name="instagram" className="" /></span>
              <div className="stack gap-2">
                <span style={{ fontWeight: "var(--fw-semibold)" }}>Instagram</span>
                <a href="https://instagram.com/brewinsight" target="_blank" rel="noopener" style={{ color: "var(--forest)", fontWeight: 600 }}>@brewinsight</a>
                <span className="body" style={{ fontSize: "var(--ui-sm)" }}>Weekly café insights, in your feed.</span>
              </div>
            </div>
            <div className="contact-method">
              <span className="mi"><Ico name="video" className="" /></span>
              <div className="stack gap-2">
                <span style={{ fontWeight: "var(--fw-semibold)" }}>Prefer a walkthrough?</span>
                <span className="body" style={{ fontSize: "var(--ui-sm)" }}>We'll set up a 15-minute call and show you your café's data live.</span>
              </div>
            </div>
          </div>

          <ContactForm />
        </div>
      </div>
    </section>
  );
}

function App() {
  useLucide();
  return (
    <React.Fragment>
      <SiteHeader active="contact" />
      <main>
        <Contact />
      </main>
      <SiteFooter />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
