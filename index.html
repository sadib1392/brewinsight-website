<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrewInsight — Insights for café owners</title>

<link rel="stylesheet" href="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/tokens/fonts.css">
<link rel="stylesheet" href="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/tokens/colors.css">
<link rel="stylesheet" href="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/tokens/typography.css">
<link rel="stylesheet" href="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/tokens/spacing.css">
<link rel="stylesheet" href="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/tokens/effects.css">
<link rel="stylesheet" href="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/styles.css">
<link rel="stylesheet" href="site.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="_ds/brewinsight-design-system-a940dfe7-11a2-43a0-b49f-55db9944d86d/_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel">
const { Logo, Eyebrow, SourceBadge, StatCard, Button, Badge, TrendChart } = window.BrewInsightDesignSystem_a940df;

function Hero() {
  return (
    <section className="section" style={{ paddingTop: "var(--space-9)" }}>
      <div className="container">
        <Framed style={{ padding: "clamp(28px, 4vw, 56px)" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1.05fr 0.95fr", gap: "var(--space-8)", alignItems: "center" }} className="hero-grid">
            <div className="stack gap-5">
              <span className="eyebrow">Insights for café owners</span>
              <h1 className="display">
                Know what your café should <span className="accent">do next.</span>
              </h1>
              <p className="lead">
                BrewInsight reads your Google and Yelp reviews, your city's coffee search trends, and the latest industry data, then hands you one sourced, do-this-week takeaway. No dashboard to babysit.
              </p>
              <div className="hero-cta mt-2">
                <a className="btn btn--forest btn--lg" href="contact.html">Start your free trial<Ico name="arrow-right" /></a>
                <a className="text-cta" href="product.html">See how it works<Ico name="arrow-right" /></a>
              </div>
              <div className="hero-proof mt-3">
                <span>14-day free trial</span><span className="dot" />
                <span>No card to start</span><span className="dot" />
                <span>Built for independent cafés</span>
              </div>
            </div>

            <div className="card hero-card" style={{ position: "relative" }}>
              <div className="row" style={{ justifyContent: "space-between", alignItems: "flex-start" }}>
                <Eyebrow handle="@brewinsight">Weekly read</Eyebrow>
                <Badge tone="forest" solid>Rising</Badge>
              </div>
              <h3 className="h3 mt-4" style={{ letterSpacing: "-0.01em" }}>
                Matcha is still climbing in your city.
              </h3>
              <div className="mt-4">
                <TrendChart
                  values={[8, 14, 12, 22, 30, 28, 46, 58, 74, 96]}
                  labels={["2021", "", "", "2024", "", "Today"]}
                  width={460}
                  height={210}
                  annotation={{ text: "All-time high", index: 9, align: "right" }}
                  style={{ width: "100%" }}
                />
              </div>
              <p className="body mt-3" style={{ fontSize: "var(--ui-sm)" }}>
                Search interest for "matcha", indexed 0–100. <strong style={{ color: "var(--ink)" }}>Worth a seasonal special.</strong>
              </p>
              <div className="mt-4">
                <SourceBadge state="light">GOOGLE TRENDS</SourceBadge>
              </div>
            </div>
          </div>
        </Framed>
      </div>
    </section>
  );
}

/* ---- "What you get every week" — Airtable-style insight modules ----
 * Each card carries a real data fragment (Airtable's product-UI-in-a-card),
 * with the last one as a deep-green signature card for editorial voltage. */
function WhatYouGet() {
  return (
    <section className="section" id="what">
      <div className="container">
        <div className="stack gap-3" style={{ maxWidth: "54ch" }}>
          <span className="eyebrow">What you get every week</span>
          <h2 className="h1">Four reads, one short email. <span className="accent">Each one already done for you.</span></h2>
        </div>
        <div className="modules mt-7">

          <div className="module">
            <div className="module__head">
              <span className="module__ico"><Ico name="message-square-quote" className="" /></span>
              <span className="module__title">Review intelligence</span>
            </div>
            <p className="module__body">Every Google and Yelp review, pulled in and checked against the source. Your rating, your volume, the themes guests keep raising.</p>
            <div className="frag">
              <div className="frag__label">Your rating · this week</div>
              <div className="frag-rating mt-2">
                <span className="num">4.6</span>
                <span className="stars">★★★★★</span>
                <span className="meta">1,142 reviews · +18 new</span>
              </div>
              <div className="chip-wrap mt-3">
                <span className="trend-chip"><Ico name="arrow-up" />Latte art</span>
                <span className="trend-chip is-amber"><Ico name="arrow-down" />Wait time</span>
              </div>
            </div>
          </div>

          <div className="module">
            <div className="module__head">
              <span className="module__ico"><Ico name="trending-up" className="" /></span>
              <span className="module__title">Weekly café trends</span>
            </div>
            <p className="module__body">What's rising and cooling in coffee right now, local to your city, told as plain numbers you can plan a menu around.</p>
            <div className="frag">
              <div className="frag__label">Rising in Los Angeles</div>
              <div className="chip-wrap mt-2">
                <span className="trend-chip"><Ico name="arrow-up" />Matcha +350%</span>
                <span className="trend-chip"><Ico name="arrow-up" />Oat milk +28%</span>
                <span className="trend-chip is-cool"><Ico name="arrow-down" />Drip cooling</span>
              </div>
            </div>
          </div>

          <div className="module">
            <div className="module__head">
              <span className="module__ico"><Ico name="users" className="" /></span>
              <span className="module__title">Cafés like yours</span>
            </div>
            <p className="module__body">See how you sit against cafés your size in your area. Benchmark yourself instead of guessing in the dark.</p>
            <div className="frag">
              <div className="frag__label">Rating vs cafés your size</div>
              <div className="bench mt-2">
                <div className="bench__track">
                  <span className="bench__fill" style={{ width: "78%" }} />
                  <span className="bench__mark" style={{ left: "78%" }} />
                </div>
                <div className="bench__row"><span>Lower</span><strong style={{ color: "var(--forest)" }}>78th percentile</strong><span>Higher</span></div>
              </div>
            </div>
          </div>

          <div className="module module--signature">
            <div className="module__head">
              <span className="module__ico"><Ico name="lightbulb" className="" /></span>
              <span className="module__title">Recommended actions</span>
            </div>
            <p className="module__body">Not just numbers. One or two clear moves to make this week, each tied back to the data behind it.</p>
            <div className="frag">
              <div className="frag__label">This week's moves</div>
              <ul className="act-list mt-2">
                <li><span className="ck"><Ico name="check" /></span><span>Run a matcha seasonal special while search is at an all-time high.</span></li>
                <li><span className="ck"><Ico name="check" /></span><span>Reply to 3 recent reviews mentioning wait times.</span></li>
              </ul>
            </div>
          </div>

        </div>
      </div>
    </section>
  );
}

/* ---- Sample dashboard — Airtable "working-tool" showcase ----
 * Illustrative sample data, framed in app chrome: filter chips, stat tiles,
 * a validated reviews table, rising-trends panel, recommended-actions panel. */
const DASH_REVIEWS = [
  { date: "Jun 18", src: "GOOGLE", stars: 5, theme: "Latte art", sent: "pos",   sentLabel: "Positive" },
  { date: "Jun 17", src: "YELP",   stars: 4, theme: "Wait time", sent: "watch", sentLabel: "Watch" },
  { date: "Jun 17", src: "GOOGLE", stars: 5, theme: "Matcha",    sent: "pos",   sentLabel: "Positive" },
  { date: "Jun 16", src: "GOOGLE", stars: 3, theme: "Seating",   sent: "neu",   sentLabel: "Neutral" },
  { date: "Jun 15", src: "YELP",   stars: 5, theme: "Oat milk",  sent: "pos",   sentLabel: "Positive" },
];
const DASH_TRENDS = [
  { name: "Matcha",      delta: "+350%",   dir: "up" },
  { name: "Oat milk",    delta: "+28%",    dir: "up" },
  { name: "Cold foam",   delta: "+12%",    dir: "up" },
  { name: "Drip coffee", delta: "Cooling", dir: "cool" },
];
const DASH_ACTIONS = [
  { text: "Add a matcha seasonal special this month.",  note: "Google Trends · matcha 96/100 in LA, an all-time high" },
  { text: "Reply to the 4 reviews mentioning wait times.", note: "Yelp · 4 mentions in the last 7 days" },
  { text: "Feature your oat-milk drinks on the board.",  note: "Local search · oat milk +28% this quarter" },
];

function starStr(n) { return "★★★★★".slice(0, n) + "☆☆☆☆☆".slice(0, 5 - n); }

function DashboardPreview() {
  return (
    <section className="section--tight" id="dashboard">
      <div className="container">
        <div className="stack gap-3" style={{ maxWidth: "54ch" }}>
          <span className="eyebrow">A sample weekly read</span>
          <h2 className="h1">Your whole week, <span className="accent">on one screen.</span></h2>
          <p className="lead">Reviews, trends, and benchmarks pulled into one working read, with a source on every number and a clear move at the end.</p>
        </div>

        <div className="dash-wrap">
          <Framed>
            <div className="dash">
              <div className="dash__chrome">
                <span className="dash__dots"><i /><i /><i /></span>
                <span className="dash__title">Corner Roasters <span className="muted">· Weekly read</span></span>
                <span className="spacer" />
                <SourceBadge state="light">GOOGLE · YELP</SourceBadge>
              </div>

              <div className="dash__body">
                <div className="dash__toolbar">
                  <span className="chip is-active"><Ico name="map-pin" />Los Angeles</span>
                  <span className="chip"><Ico name="calendar" />This week</span>
                  <span className="chip"><Ico name="star" />Google + Yelp</span>
                  <span className="spacer" />
                  <span className="chip"><Ico name="sliders-horizontal" />Filters</span>
                </div>

                <div className="dash__tiles">
                  <div className="tile">
                    <span className="tile__label">Rating</span>
                    <span className="tile__fig"><span className="v">4.6</span><span className="tile__delta up"><Ico name="arrow-up" />0.2</span></span>
                  </div>
                  <div className="tile">
                    <span className="tile__label">New reviews</span>
                    <span className="tile__fig"><span className="v">18</span><span className="tile__delta up"><Ico name="arrow-up" />6</span></span>
                  </div>
                  <div className="tile">
                    <span className="tile__label">Positive</span>
                    <span className="tile__fig"><span className="v">82%</span><span className="tile__delta up"><Ico name="arrow-up" />4</span></span>
                  </div>
                </div>

                <div className="dash__split">
                  <div>
                    <div className="dash__pane-label"><span>Recent reviews</span><span>Validated vs listing</span></div>
                    <div className="dtable-wrap">
                      <table className="dtable">
                        <thead><tr><th>Date</th><th>Source</th><th>Rating</th><th>Theme</th><th>Sentiment</th></tr></thead>
                        <tbody>
                          {DASH_REVIEWS.map((r, i) => (
                            <tr key={i}>
                              <td>{r.date}</td>
                              <td><span className="src">{r.src}</span></td>
                              <td><span className="stars">{starStr(r.stars)}</span></td>
                              <td><span className="theme-tag">{r.theme}</span></td>
                              <td><span className={"sent " + r.sent}><span className="d" />{r.sentLabel}</span></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  <div>
                    <div className="dash-panel">
                      <div className="dash__pane-label" style={{ marginBottom: 0 }}><span>Rising in your city</span></div>
                      <div className="mt-2">
                        {DASH_TRENDS.map((t, i) => (
                          <div className="trend-row" key={i}>
                            <span className="name">{t.name}</span>
                            <span className={"trend-chip " + (t.dir === "up" ? "" : "is-cool")}>
                              <Ico name={t.dir === "up" ? "arrow-up" : "arrow-down"} />{t.delta}
                            </span>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="dash-panel">
                      <div className="dash__pane-label" style={{ marginBottom: 0 }}><span>Recommended this week</span></div>
                      <div className="mt-2">
                        {DASH_ACTIONS.map((a, i) => (
                          <div className="rec" key={i}>
                            <span className="rec__mark"><Ico name="check" /></span>
                            <span className="rec__text">{a.text}<span className="src-note">{a.note}</span></span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="dash__foot">
                  <span className="illustrative">Sample data, shown for illustration ☕</span>
                  <span className="pill pill--source"><span className="lbl">SOURCE:</span> GOOGLE · YELP · GOOGLE TRENDS</span>
                </div>
              </div>
            </div>
          </Framed>
        </div>
      </div>
    </section>
  );
}

function Proof() {
  return (
    <section className="section--tight">
      <div className="container">
        <div className="row wrap" style={{ justifyContent: "space-between", alignItems: "flex-end", gap: "var(--space-5)" }}>
          <div className="stack gap-3" style={{ maxWidth: "46ch" }}>
            <span className="eyebrow">The kind of insight you get</span>
            <h2 className="h2">Numbers you can actually use, never a stat without a source.</h2>
          </div>
          <span className="pill pill--source"><span className="lbl">SOURCE:</span> GOOGLE TRENDS · NCA · STATISTA</span>
        </div>
        <div className="grid grid-3 mt-6">
          <StatCard sub="Trend" figure="+350%" caption="rise in matcha searches since 2021" accent="var(--forest)" />
          <StatCard sub="Demographics" figure="40%" caption="of US coffee drinkers are Millennials" accent="var(--ink)" />
          <StatCard sub="Peak" figure="96/100" caption="matcha search index in LA, an all-time high" accent="var(--forest)" />
        </div>
      </div>
    </section>
  );
}

function Manifesto() {
  return (
    <section className="dark section bi-graph-paper">
      <div className="container">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "var(--space-8)", alignItems: "center" }} className="grid-2">
          <div className="stack gap-5">
            <span className="eyebrow">Why we built this</span>
            <h2 className="h1" style={{ color: "var(--paper)" }}>
              Made for the people <span className="accent-lime">behind the counter.</span>
            </h2>
            <p className="lead">
              The big chains have analysts. You have a morning rush and a wholesale order to chase. BrewInsight does the reading so you don't have to, and we never dress up a guess as a fact.
            </p>
          </div>
          <ul className="check" style={{ fontSize: "var(--ui-lg)", color: "var(--paper)" }}>
            <li><span className="ck"><Ico name="badge-check" /></span><span><strong>Credibility first.</strong> Every number carries its source. If we can't back it, we don't post it.</span></li>
            <li><span className="ck"><Ico name="shield-check" /></span><span><strong>Honest data.</strong> We validate review counts against the real listing. No silent gaps, no inflated figures.</span></li>
            <li><span className="ck"><Ico name="coffee" /></span><span><strong>Independent only.</strong> Built for small cafés and the people opening their first one, not enterprise chains.</span></li>
          </ul>
        </div>
      </div>
    </section>
  );
}

function CTABand() {
  return (
    <section className="section">
      <div className="container">
        <Framed className="card" style={{ background: "var(--surface-card)", padding: "clamp(32px, 5vw, 64px)", textAlign: "center" }}>
          <div className="stack" style={{ alignItems: "center", gap: "var(--space-5)" }}>
            <span className="aside">your first read is on us</span>
            <h2 className="h1" style={{ maxWidth: "20ch" }}>Start reading your café's data this week.</h2>
            <p className="lead" style={{ textAlign: "center", maxWidth: "48ch" }}>
              Free for 14 days. No card to get started. Founding cafés keep their rate for life.
            </p>
            <a className="btn btn--forest btn--lg mt-2" href="contact.html">Start your free trial<Ico name="arrow-right" /></a>
          </div>
        </Framed>
      </div>
    </section>
  );
}

function App() {
  useLucide();
  return (
    <React.Fragment>
      <SiteHeader active="about" />
      <main>
        <Hero />
        <WhatYouGet />
        <DashboardPreview />
        <Proof />
        <Manifesto />
        <CTABand />
      </main>
      <SiteFooter />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<style>
@media (max-width: 860px) {
  .hero-grid { grid-template-columns: 1fr !important; }
  .grid-2 { grid-template-columns: 1fr !important; }
}
</style>
</body>
</html>
