  },
  {
    icon: "line-chart",
    title: "Weekly trend reports",
    body: "A short report every week on what's rising and cooling in coffee, local to your city, so your menu moves before the trend does.",
    points: ["Search-trend tracking by city", "Seasonal and emerging drinks", "Plain-language takeaways"],
  },
  {
    icon: "scale",
    title: "Benchmarks vs cafés like yours",
    body: "See how your rating, review momentum, and pricing sit against cafés your size in your area. Context, not just numbers.",
    points: ["Compare to similar cafés", "Rating and momentum percentiles", "Spot where you're ahead or behind"],

  {

];

function Features() {

/* ---- "How it works" → Intercom (warm, product-led, conversational) ----
 * Adapts Intercom's marketing pattern: a calm cream ground, floating white
 * tiles with hairline borders (Intercom resists drop shadows — depth comes
 * from the white-on-cream surface change), a quiet connecting flow, and ONE
 * confident forest accent. Intercom leads every block with a product peek, so
 * each step's protagonist is a small, high-fidelity UI fragment. The copy is a
 * friendly sentence spoken straight to the owner, sentence-case throughout —
 * a conversation, never a corporate process diagram. */
const STEPS = [
  {
    n: "1",
    label: "First",
    ico: "link",
    title: "Connect your listings",
    body: "Paste in your Google and Yelp links and you're set. That's the whole setup, and most owners are done inside two minutes.",
    aside: "no logins to hand over",
    peek: (
      <div className="how-peek">
        <span className="how-peek__label">Your café</span>
        <div className="how-peek__field"><Ico name="link" /><span>google.com/maps/place/corner-roasters</span></div>
        <div className="how-peek__field"><Ico name="link" /><span>yelp.com/biz/corner-roasters-la</span></div>
        <span className="how-peek__ok"><Ico name="check" />Listings found</span>
      </div>
    ),
  },
  {
    n: "2",
    label: "Then",
    ico: "shield-check",
    title: "We pull and check the data",
    body: "We gather your reviews and the latest coffee-industry numbers, then check every figure against the real source before it ever reaches you.",
    aside: "we'd rather be right than fast",
    peek: (
      <div className="how-peek">
        <span className="how-peek__label">Validating</span>
        <div className="how-peek__row"><span>Google reviews</span><span className="how-peek__chk"><Ico name="check" />1,142 matched</span></div>
        <div className="how-peek__row"><span>Yelp reviews</span><span className="how-peek__chk"><Ico name="check" />318 matched</span></div>
        <div className="how-peek__row"><span>Trend data</span><span className="how-peek__chk"><Ico name="check" />Sourced</span></div>
      </div>
    ),
  },
  {
    n: "3",
    label: "Every week",
    ico: "mail",
    title: "You get your weekly read",
    body: "A short, sourced email lands in your inbox each week, with one clear thing worth doing about it. No dashboard to check, no logins to remember.",
    aside: "five-minute read, tops",
    peek: (
      <div className="how-peek">
        <span className="how-peek__label">In your inbox</span>
        <div className="how-peek__mail">
          <span className="how-peek__from"><Ico name="coffee" />BrewInsight · Weekly read</span>
          <span className="how-peek__subj">Matcha is still climbing in your city</span>
        </div>
        <span className="how-peek__ok"><Ico name="badge-check" />A source on every number</span>
      </div>
    ),
  },
];

function HowItWorks() {
  return (
    <section className="section how" id="how">
      <div className="container">
        <div className="stack gap-4 how-intro">
          <span className="eyebrow">How it works</span>
          <h2 className="h1" style={{ maxWidth: "18ch" }}>Getting started is genuinely <span className="accent">a two-minute job.</span></h2>
          <p className="lead" style={{ maxWidth: "52ch" }}>No setup marathon, no onboarding calls. Here's the whole thing, start to finish, talked through in three friendly steps.</p>
        </div>

        <ol className="how-flow mt-7">
          {STEPS.map((s, i) => (
            <li key={s.n} className={"how-step" + (i % 2 === 1 ? " is-flip" : "")}>
              <div className="how-rail" aria-hidden="true">
                <span className="how-num">{s.n}</span>
                {i < STEPS.length - 1 && <span className="how-line" />}
              </div>
              <div className="how-pair">
                <div className="how-say">
                  <span className="how-step-label">{s.label}</span>
                  <h3 className="how-title">{s.title}</h3>
                  <p className="how-body">{s.body}</p>
                  <span className="how-aside">{s.aside}</span>
                </div>
                <div className="how-show">
                  <div className="how-show__top">
                    <span className="how-ico"><Ico name={s.ico} /></span>
                    <span className="how-show__step">Step {s.n} of 3</span>
                  </div>
                  {s.peek}
                </div>
              </div>
            </li>
          ))}
        </ol>

        <div className="how-foot mt-6">
          <span className="how-foot__dot" aria-hidden="true"><Ico name="check" /></span>
          <p className="body" style={{ margin: 0 }}>
            That's it. From there the reading is on us, every week, with a source on every number.

        </div>

}

/* ---- "Pricing" → Shopify transactional/conversion track ----
 * Adapts Shopify's transactional (not cinematic) track: a calm light canvas,
 * ONE clean offer, ONE dominant action, a simple benefit checklist, and the
 * brand's amber money accent standing in for Shopify's aloe featured-tier fill.
 * Shopify's signature is the pill button and the stacked-tiny-shadow paper halo
 * on light cards — both are honoured here. The single pill CTA is the loudest
 * thing on the band; everything else is structural and quiet so the next step
 * is unmistakable. Clutter stripped: one price, one button, one checklist. */
function Pricing() {
  const includes = [
    "Weekly review + trend report",
    "Google & Yelp review tracking, validated",
    "Local search-trend reports",
    "Benchmarks vs cafés like yours",
    "A source on every number",
    "Email support, reply within a day",
  ];
  return (
    <section className="section price" id="pricing">
      <div className="container">
        <div className="stack gap-3 price-head">
          <span className="eyebrow" style={{ alignSelf: "center" }}>Pricing</span>
          <h2 className="h1">One plan. <span className="accent-amber">One fair price.</span></h2>
          <p className="lead">
            Less than a few bags of beans a month. Start free for 14 days, no card to begin.
          </p>
        </div>

        <div className="price-stage">
          <div className="price-card">
            <span className="price-flag"><Ico name="sparkles" />Founding plan</span>

            <div className="price-card__head">
              <span className="price-plan">For one independent café</span>
              <span className="price-badge"><Ico name="lock" />Rate locked for life</span>
            </div>

            <div className="price-figure">
              <span className="price-amount">$29</span>
              <span className="price-period"><span className="per">/ month</span><span className="sub">per café</span></span>
            </div>
            <p className="price-alt">Or <strong>$290 a year</strong>, two months free.</p>

            <a className="price-cta" href="contact.html">
              Start your 14-day free trial<Ico name="arrow-right" />
            </a>
            <p className="price-reassure"><Ico name="check" />No card required to start. Cancel any time.</p>

            <div className="price-rule" />

            <span className="price-includes-label">Everything's included</span>
            <ul className="check price-list">
              {includes.map(i => (
                <li key={i}><span className="ck"><Ico name="check" /></span><span>{i}</span></li>
              ))}
            </ul>
          </div>

          <p className="price-multi">
            Running more than one café? <a href="contact.html">Talk to us about multi-location pricing.</a>
          </p>
        </div>
      </div>
    </section>
  );
}

/* ---- "FAQ" → Mintlify (scannable doc answers) + Intercom (friendly tone) ----
 * Mintlify gives the reading-optimised structure: a quiet doc eyebrow, clean
 * hairline rows, comfortable 1.5 body leading, and the brand accent reserved
 * for the active row (Mintlify's mint-on-active move, in forest). Intercom
 * gives the voice: every answer is short, plain-spoken, and human. Native
 * <details>/<summary> keeps it keyboard-friendly with no extra script. */
const FAQ = [
  {
    q: "Do I need to install anything?",
    a: "No. Share your Google and Yelp links and BrewInsight does the rest. Your weekly read arrives by email, so there's nothing to log into and no dashboard to babysit.",
  },
  {
    q: "Where does the data come from?",
    a: "Your live Google and Yelp listings, Google Trends, and trusted industry sources like the NCA, Statista, and Toast. Every figure carries its source, and anything we interpret is marked as an interpretation, never dressed up as a fact.",
  },
  {
    q: "How do you make sure the numbers are right?",
    a: "We validate review counts against the real listing before anything reaches you. If Google shows 1,100 reviews, we show 1,100, never a silent gap or an inflated figure.",
  },
  {
    q: "How long does setup actually take?",
    a: "About two minutes. You paste in two links, we confirm we've found your listings, and you're done. Your first weekly read follows within a few days.",
  },
  {
    q: "What happens after the 14-day free trial?",
    a: "Nothing automatic, and no card is needed to start. We'll check in before the trial ends so you decide. Keep going only if it's earning its place.",
  },
  {
    q: "Can I cancel whenever I want?",
    a: "Yes. Cancel any time in a click, no notice period and no exit fee. Founding cafés who stay keep the $29 rate locked for life.",
  },
  {
    q: "I run more than one café. Does that work?",
    a: "It does. Each location gets its own weekly read and its own benchmarks. Get in touch and we'll set up simple multi-location pricing for you.",
  },
];

function Faq() {
  return (
    <section className="section--tight faq" id="faq">
      <div className="container">
        <div className="faq-grid">
          <div className="stack gap-3 faq-head">
            <span className="eyebrow">Good to know</span>
            <h2 className="h2">Questions, answered <span className="accent">plainly.</span></h2>
            <p className="lead">The things café owners ask us most, in plain language. Open any one to read more.</p>
            <div className="faq-foot">
              <span className="faq-foot__ico" aria-hidden="true"><Ico name="message-circle" /></span>
              <div className="stack gap-2">
                <p className="body" style={{ margin: 0, color: "var(--ink)", fontWeight: "var(--fw-semibold)" }}>Still wondering about something?</p>
                <a className="text-cta" href="contact.html">Ask us directly<Ico name="arrow-right" /></a>
              </div>
            </div>
          </div>

          <div className="faq-list">
            {FAQ.map((f, i) => (
              <details className="faq-item" key={f.q} open={i === 0}>
                <summary className="faq-q">
                  <span className="faq-q__text">{f.q}</span>
                  <span className="faq-chev" aria-hidden="true"><Ico name="chevron-down" /></span>
                </summary>
                <p className="faq-a">{f.a}</p>
              </details>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

function App() {
  useLucide();
  return (
    <React.Fragment>
      <SiteHeader active="product" />
      <main>
        <Hero />
        <Features />
        <HowItWorks />
        <Pricing />
        <Faq />
      </main>
      <SiteFooter />
    </React.Fragment>

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<style>
/* =====================================================================
 * PRODUCT PAGE REDESIGN — patterns adapted onto the BrewInsight brand.
 *   How it works → Intercom  (warm, product-led conversational tiles)
 *   Pricing      → Shopify    (one offer, one dominant action, amber money)
 *   FAQ          → Mintlify + Intercom (scannable doc answers, friendly tone)
 * Built only from design-system tokens. No source-brand colors or fonts.
 * ===================================================================== */

/* ---- How it works → Intercom: a calm cream ground, a conversational
 * guided sequence where each step pairs one human sentence with a floating
 * white product peek (the protagonist), threaded on a quiet vertical spine.
 * Intercom leads with the product and keeps marketing chrome minimal, so the
 * peeks carry the visual weight and a single forest accent leads throughout.
 * Intercom resists drop shadows: the white tile lifts off the cream ground by
 * the surface change and a hairline border, not by a heavy shadow. Steps
 * alternate the say/show columns so the reading zig-zags like a conversation. */
.how-flow {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: var(--space-7);
}
.how-step {
  display: grid;
  grid-template-columns: 34px 1fr;
  gap: var(--space-5);
  align-items: start;
}
/* the quiet vertical spine: numbered node + connecting line */
.how-rail {
  display: flex;
  flex-direction: column;
  align-items: center;
  align-self: stretch;
  gap: var(--space-3);
}
.how-num {
  width: 34px; height: 34px;
  flex: 0 0 auto;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--radius-pill);
  background: var(--forest);
  color: var(--paper);
  font-weight: var(--fw-extrabold);
  font-size: var(--ui-base);
  line-height: 1;
}
.how-line {
  flex: 1 1 auto;
  width: 2px;
  min-height: 32px;
  border-radius: 1px;
  background: linear-gradient(to bottom, color-mix(in srgb, var(--forest) 32%, transparent), var(--track-grey));
}
/* each step: a conversational "say" column + a floating "show" peek */
.how-pair {
  display: grid;
  grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
  gap: var(--space-6);
  align-items: center;
  padding-bottom: var(--space-2);
}
/* alternate the columns so the conversation zig-zags down the page */
.how-step.is-flip .how-say { order: 2; }
.how-step.is-flip .how-show { order: 1; }
.how-say { display: flex; flex-direction: column; }
.how-step-label {
  font-weight: var(--fw-semibold);
  text-transform: uppercase;
  letter-spacing: var(--track-eyebrow);
  font-size: var(--ui-xs);
  color: var(--forest);
  line-height: 1;
  margin-bottom: var(--space-3);
}

  display: inline-flex; align-items: center; justify-content: center;

}

/* ---- Pricing: Shopify single-offer conversion ----
 * The transactional track: light canvas, one offer, one pill action. Shopify's
 * two signatures are honoured — the pill-shape CTA (never a rounded rectangle)
 * and the stacked-tiny-shadow paper halo on the light card. Amber stands in for
 * Shopify's aloe featured fill as the single money accent. */
.price-head { max-width: 46ch; margin: 0 auto; text-align: center; align-items: center; }
.price-head .lead { text-align: center; margin: 0 auto; }
.price-stage { max-width: 560px; margin: var(--space-7) auto 0; }
.price-card {
  position: relative;
  padding: clamp(28px, 4vw, 48px);
  border: 1px solid var(--track-grey);
  border-top: 3px solid var(--amber);
  /* Shopify's stacked-tiny-shadow paper halo on light surfaces */
  box-shadow:
    0 8px 8px rgba(26,26,26,0.04),
    0 4px 4px rgba(26,26,26,0.04),
    0 2px 2px rgba(26,26,26,0.04);
}
/* the "Founding plan" flag — amber money pill, Shopify featured cue */
.price-flag {
  position: absolute;
  top: 0; left: 50%;
  transform: translate(-50%, -50%);
  display: inline-flex;
  align-items: center;
  gap: 0.4em;
  padding: 7px 16px;
  border-radius: var(--radius-pill);
  background: var(--amber);
  color: var(--paper);
  font-weight: var(--fw-bold);
  font-size: var(--ui-xs);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.price-flag svg { width: 13px; height: 13px; }
.price-card__head {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
  margin-top: var(--space-3);
}
.price-plan {
  font-weight: var(--fw-semibold);
  text-transform: uppercase;
  letter-spacing: var(--track-eyebrow);
  font-size: var(--ui-sm);
  color: var(--ink);
}
.price-badge {
  display: inline-flex;
  align-items: center;
  font-weight: var(--fw-bold);
  font-size: var(--ui-xs);
  letter-spacing: 0.04em;
  color: var(--amber);
  background: color-mix(in srgb, var(--amber) 14%, var(--paper));
  border-radius: var(--radius-pill);
  padding: 6px 12px;
}
.price-figure {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  margin-top: var(--space-5);
}
.price-amount {
  font-weight: var(--fw-black);
  font-size: clamp(60px, 9vw, 92px);
  line-height: 0.85;
  color: var(--amber);
  letter-spacing: -0.02em;
}
.price-period {
  font-size: var(--ui-base);
  color: var(--text-muted);
  line-height: 1.25;
  padding-bottom: 8px;
}
.price-alt {
  color: var(--text-muted);
  font-size: var(--ui-sm);
  margin: var(--space-3) 0 0;
}
/* the single dominant action — Shopify's pill, the loudest thing on the band.
 * Forest fill leads the section (the lead accent); amber stays the money cue. */
.price-cta {
  width: 100%;
  margin-top: var(--space-5);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.55em;
  font-family: var(--font-structure);
  font-weight: var(--fw-semibold);
  font-size: var(--ui-lg);
  line-height: 1;
  letter-spacing: 0.01em;
  padding: 17px 28px;
  border-radius: var(--radius-pill);
  background: var(--forest);
  color: var(--paper);
  border: 2px solid var(--forest);
  cursor: pointer;
  transition: filter var(--dur-fast) var(--ease-standard), transform var(--dur-fast) var(--ease-standard);
}
.price-cta:hover { filter: brightness(0.94); transform: translateY(-1px); }
.price-cta:active { filter: brightness(0.88); transform: translateY(0); }
.price-cta svg { width: 18px; height: 18px; }
.price-reassure {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5em;
  color: var(--body-grey);
  font-size: var(--ui-sm);
  font-weight: var(--fw-medium);
  margin: var(--space-3) 0 0;
}
.price-reassure svg { width: 15px; height: 15px; color: var(--forest); }
.price-rule {
  height: 1px;
  background: var(--track-grey);
  margin: var(--space-6) 0;
}
.price-includes-label {
  display: block;
  font-weight: var(--fw-semibold);
  text-transform: uppercase;
  letter-spacing: var(--track-eyebrow);
  font-size: var(--ui-xs);
  color: var(--body-grey);
  margin-bottom: var(--space-4);
}
.price-list { font-size: var(--ui-base); }
.price-multi {
  text-align: center;
  margin-top: var(--space-5);
  color: var(--text-muted);
  font-size: var(--ui-sm);
}
.price-multi a { color: var(--forest); font-weight: var(--fw-semibold); }
.price-multi a:hover { text-decoration: underline; }

/* ---- FAQ: Mintlify scannable accordion, Intercom tone ---- */
.faq-list {
  display: grid;
  gap: var(--space-3);
  max-width: 760px;
}
.faq-item {
  background: var(--surface-card);
  border: 1px solid var(--track-grey);
  border-radius: var(--radius-md);
  padding: var(--space-5) var(--space-6);
  transition: border-color var(--dur-fast) var(--ease-standard);
}
.faq-item[open] { border-color: color-mix(in srgb, var(--forest) 40%, var(--track-grey)); }
.faq-q {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  cursor: pointer;
  list-style: none;
  font-weight: var(--fw-bold);
  font-size: var(--ui-lg);
  color: var(--ink);
  line-height: 1.3;
}
.faq-q::-webkit-details-marker { display: none; }
.faq-chev {
  flex: 0 0 auto;
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--radius-pill);
  background: var(--surface-sunken);
  color: var(--forest);
  transition: transform var(--dur-fast) var(--ease-standard);
}
.faq-chev svg { width: 17px; height: 17px; }
.faq-item[open] .faq-chev { transform: rotate(180deg); }
.faq-a {
  color: var(--text-muted);
  font-size: var(--ui-base);
  line-height: 1.55;
  margin: var(--space-3) 0 0;
  max-width: 64ch;
}
.faq-foot {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--space-4);
}

/* ---- Responsive ---- */
@media (max-width: 860px) {
  .how-flow { gap: var(--space-6); }
  .how-pair {
    grid-template-columns: 1fr;
    gap: var(--space-4);
    align-items: start;
  }
  .how-body { max-width: none; }
  .how-aside { margin-bottom: var(--space-2); }
}
@media (max-width: 540px) {
  .how-step { grid-template-columns: 30px 1fr; gap: var(--space-4); }
  .how-num { width: 30px; height: 30px; font-size: var(--ui-sm); }
  .faq-item { padding: var(--space-4) var(--space-5); }
  .faq-q { font-size: var(--ui-base); }
}
</style>
</body>
</html>
